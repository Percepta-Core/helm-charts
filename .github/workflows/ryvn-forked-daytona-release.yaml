name: Build & Release forked-daytona

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "charts/daytona/**"
      - ".github/workflows/ryvn-forked-daytona-release.yaml"
  pull_request:
    paths:
      - "charts/daytona/**"

jobs:
  release:
    uses: ryvn-technologies/ryvn-build-action/.github/workflows/release.yml@v2
    with:
      service_name: forked-daytona
    permissions:
      contents: write
      id-token: write
    secrets:
      RYVN_CLIENT_ID: ${{ secrets.RYVN_CLIENT_ID }}
      RYVN_CLIENT_SECRET: ${{ secrets.RYVN_CLIENT_SECRET }}
